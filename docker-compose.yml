services:

  # ── Letta Server ──────────────────────────────────────────────────
  letta-server:
    image: letta/letta:0.16.6
    container_name: letta-server
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "3001:3001"
    volumes:
      - ~/.letta/.persist/pgdata:/var/lib/postgresql/data
      - ${DOCUMENT_STORE_PATH:-./space}:/documents
    env_file:
      - .env
    environment:
      # The coding sandbox service URL for the custom tool
      - SANDBOX_SERVICE_URL=http://coding-sandbox:3002
      # Enable stdio MCP servers (GitHub, filesystem via npx)
      - MCP_DISABLE_STDIO=false
      # Increase tool sandbox timeout to 10 minutes (default is 180s = 3 min)
      # Coding tasks via execute_coding_task can take 3-5 minutes
      - TOOL_SANDBOX_TIMEOUT=600
      # Ollama for local embeddings (archival memory)
      - OLLAMA_BASE_URL=http://ollama:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  # ── Coding Sandbox Service ────────────────────────────────────────
  # Runs Letta Code SDK in an isolated environment for executing coding tasks.
  # The Personal Assistant's execute_coding_task tool calls this service.
  coding-sandbox:
    dns:
      - 1.1.1.1
      - 8.8.8.8
    build:
      context: .
      dockerfile: Dockerfile.coding-sandbox
    container_name: coding-sandbox
    env_file:
      - .env
    volumes:
      # Mount skills for live editing during development (overrides baked-in copy)
      - ./agents/skills:/app/skills:ro
    environment:
      # Connect back to Letta server for LLM calls and memory
      - LETTA_BASE_URL=http://letta-server:3001
      - PORT=3002
      - WORKSPACE_ROOT=/workspace
      - TASK_TIMEOUT_MS=600000
      # GitHub authentication for cloning private repos and using gh CLI
      - GH_TOKEN=${GH_TOKEN:-}
      # Skills source directory inside the container
      - SKILLS_SOURCE=/app/skills
      # Commit co-authorship (optional) — credits you alongside the bot
      - GIT_COAUTHOR_NAME=${GIT_COAUTHOR_NAME:-}
      - GIT_COAUTHOR_EMAIL=${GIT_COAUTHOR_EMAIL:-}
    depends_on:
      letta-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Discord Bot (official letta-discord-bot-example) ──────────────
  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile.discord-bot
    container_name: letta-discord-bot
    env_file:
      - .env
    environment:
      # Override LETTA_BASE_URL so the bot reaches the server
      # by Docker service name, not localhost
      - LETTA_BASE_URL=http://letta-server:3001
    depends_on:
      letta-server:
        condition: service_healthy
      coding-sandbox:
        condition: service_healthy
    restart: unless-stopped

  # ── Ollama (local embedding model) ──────────────────────────────
  # Provides local embeddings for archival memory. The letta/letta-free
  # hosted service is deprecated; this replaces it with a self-hosted model.
  # After first start, pull the model: docker compose exec ollama ollama pull mxbai-embed-large
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  ollama_data:
