name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-sandbox-service:
    name: Build Sandbox Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sandbox-service/package-lock.json

      - name: Install dependencies
        working-directory: sandbox-service
        run: npm ci

      - name: Build TypeScript
        working-directory: sandbox-service
        run: npm run build

  build-discord-bot:
    name: Build Discord Bot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: letta-discord-bot-example/package-lock.json

      - name: Install dependencies
        working-directory: letta-discord-bot-example
        run: npm ci

      - name: Build TypeScript
        working-directory: letta-discord-bot-example
        run: npm run build

  docker-lint:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Dockerfile.coding-sandbox
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.coding-sandbox
          failure-threshold: error

      - name: Lint Dockerfile.discord-bot
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.discord-bot
          failure-threshold: error
